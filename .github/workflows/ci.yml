name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Pyright (basic)
        run: pyright --pythonpath "$(which python)" src/

      - name: Import-linter contracts
        run: lint-imports

      - name: NX-grep guard (no NXOpen imports in src/)
        run: |
          if grep -rE "^(import NXOpen|from NXOpen)" src/; then
            echo "::error::NXOpen import found in src/; this is forbidden (N4)"
            exit 1
          fi

      - name: Pytest
        run: pytest -q

      - name: Coverage (soft target >=80% on intent + intent_validation)
        run: |
          coverage run -m pytest -q
          coverage report
