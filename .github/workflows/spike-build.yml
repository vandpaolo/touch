# T0 spike — Day 5: build the Windows .exe on a GitHub Actions Windows runner.
#
# The Linux dev box cannot produce a Windows installer; this is the cross-build
# path (ADR-0009 / phase-T0 Day 5). Triggers on a tag push matching `spike-v*`
# (e.g. `git tag spike-v0.1.0 && git push origin spike-v0.1.0`), or manually
# via workflow_dispatch for a no-tag test build.
#
# Pipeline: PyInstaller the sidecar (R1, reuses spike/sidecar/build.spec) ->
# headless WS-handshake smoke on the frozen .exe (Max goal) -> build the Vite
# frontend -> electron-builder NSIS installer (R2/R13) -> upload the .exe.
# On a tag, the .exe is also attached to a GitHub Release so it can be
# downloaded and installed on a real Windows machine (Day 6 verification).

name: spike-build

on:
  push:
    tags:
      - "spike-v*"
  workflow_dispatch: {}

permissions:
  contents: write # needed to create the Release on a tag

jobs:
  windows-build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash # git-bash is preinstalled; keeps step scripts portable

    steps:
      - uses: actions/checkout@v4

      # R12: the OCP wheel is pinned to a Python minor — match it exactly.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # --- sidecar: install (cadquery-ocp + numpy + pyinstaller) + freeze ---
      - name: Install sidecar deps
        run: python -m pip install -e "spike/sidecar[build]"

      - name: PyInstaller freeze sidecar (R1)
        working-directory: spike/sidecar
        run: python -m PyInstaller build.spec --noconfirm

      # Max goal: prove the FROZEN .exe boots OCP + binds the WS port, with no
      # dev Python involved beyond launching it. Asserts OCP_SELFCHECK volume
      # and the TOUCH_READY sentinel appear on stdout within 30 s.
      - name: Smoke the frozen sidecar (WS handshake + OCP selfcheck)
        shell: pwsh
        working-directory: spike/sidecar
        run: |
          $exe = "dist/touch_sidecar/touch_sidecar.exe"
          if (-not (Test-Path $exe)) { throw "frozen sidecar not found: $exe" }
          $out = "smoke_out.txt"
          $p = Start-Process -FilePath $exe -RedirectStandardOutput $out `
                 -RedirectStandardError "smoke_err.txt" -PassThru -NoNewWindow
          $ready = $false; $self = $false
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Milliseconds 500
            if (Test-Path $out) {
              $txt = Get-Content $out -Raw
              if ($txt -match "OCP_SELFCHECK.*volume=1000\.0") { $self = $true }
              if ($txt -match "TOUCH_READY \d+") { $ready = $true; break }
            }
          }
          Write-Host "--- sidecar stdout ---"; Get-Content $out -ErrorAction SilentlyContinue
          Write-Host "--- sidecar stderr ---"; Get-Content "smoke_err.txt" -ErrorAction SilentlyContinue
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          if (-not $self)  { throw "OCP selfcheck (volume=1000.0) not observed — likely a missing OCCT DLL (R1)" }
          if (-not $ready) { throw "TOUCH_READY not observed within 30 s" }
          Write-Host "SMOKE_OK: frozen sidecar booted OCP and bound the WS port"

      # --- frontend: build the Vite bundle ---------------------------------
      - name: Build web
        working-directory: spike/web
        run: |
          npm ci
          npm run build

      # --- shell: build the NSIS installer (bundles web/dist + sidecar dist)-
      - name: Build installer (electron-builder)
        working-directory: spike/shell
        run: |
          npm ci
          npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Touch-spike-setup
          path: spike/shell/release/*setup.exe
          if-no-files-found: error

      # On a tag push, publish the .exe to a GitHub Release for download.
      - name: Attach installer to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: spike/shell/release/*setup.exe
          fail_on_unmatched_files: true
